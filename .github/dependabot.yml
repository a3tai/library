version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    ignore:
      # Dependabot mis-ranks this older Wails prerelease as newer than alpha.96.
      - dependency-name: github.com/wailsapp/wails/v3
        versions:
          - 3.0.0-alpha.8.3

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly

  - package-ecosystem: gradle
    directory: /build/android
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /build/docker
    schedule:
      interval: weekly
