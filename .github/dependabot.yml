version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    ignore:
      # Dependabot mis-ranks older Wails prereleases as updates to alpha.96.
      # Manage Wails v3 manually until its prerelease ordering is stable.
      - dependency-name: github.com/wailsapp/wails/v3

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly

  - package-ecosystem: gradle
    directory: /build/android
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /build/docker
    schedule:
      interval: weekly
