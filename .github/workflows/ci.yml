name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Scan committed files for secrets
        run: ./scripts/secret-scan.sh

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install Wails CLI
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          WAILS_VERSION="$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v3)"
          go install github.com/wailsapp/wails/v3/cmd/wails3@"${WAILS_VERSION}"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check frontend
        working-directory: frontend
        run: npm run check

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend smoke tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Audit production npm dependencies
        working-directory: frontend
        run: npm audit --omit=dev

      - name: Verify Go modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Verify generated Wails bindings are current
        run: |
          wails3 generate bindings -clean=true -ts ./...
          git diff --exit-code -- frontend/bindings

      - name: Test Go packages
        run: go test ./...

      - name: Build Go packages
        run: go build ./...

  desktop-build:
    name: Desktop Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            command: wails3 task linux:build
          - name: macOS
            os: macos-latest
            command: wails3 task darwin:package
          - name: Windows
            os: windows-latest
            command: wails3 task windows:build

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install Wails CLI
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          WAILS_VERSION="$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v3)"
          go install github.com/wailsapp/wails/v3/cmd/wails3@"${WAILS_VERSION}"

      - name: Build desktop app
        run: ${{ matrix.command }}
